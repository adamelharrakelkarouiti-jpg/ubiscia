<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubiscia - Global AI Landmark Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            align-items: stretch;
            margin-bottom: 30px;
        }

        .scanner-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1;
            display: none; 
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 {
            font-size: 2rem;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        button {
            background-color: #2b6cb0;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
            margin: 10px 0;
            width: 100%;
        }

        button:hover {
            background-color: #2c5282;
        }

        input[type="text"] {
            width: calc(100% - 24px);
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #2b6cb0;
        }

        .external-link-btn {
            background-color: #2d3748;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 5px;
            width: calc(100% - 48px);
            transition: background 0.2s ease;
        }

        .external-link-btn:hover {
            background-color: #1a202c;
        }

        #status-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            color: #2b6cb0;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .divider {
            margin: 15px 0;
            color: #a0aec0;
            font-size: 0.85rem;
            position: relative;
        }

        .info-card h2 {
            color: #2b6cb0;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .info-card p {
            line-height: 1.6;
            color: #4a5568;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <!-- PANEL IZQUIERDO: CONTROLES -->
        <div class="scanner-card">
            <h1>Ubiscia</h1>
            <p class="subtitle">Global AI Landmark & Monument Detector</p>
            
            <div id="btn-control-container">
                <button type="button" onclick="detectLandmarkByIP()">🌍 Auto-Detect Nearby Landmark</button>
            </div>

            <div class="divider">— OR SEARCH ANY PLACE —</div>

            <div>
                <input type="text" id="manual-search-input" placeholder="e.g. Alhambra, Eiffel Tower, Sagrada Familia">
                <button type="button" style="background-color: #2d3748;" onclick="searchManualLandmark()">🔍 Search Landmark</button>
            </div>
            
            <div id="status-box">
                Auto-detect nearby monuments or search any global landmark manually.
            </div>
        </div>

        <!-- PANEL DERECHO: INFORMACIÓN Y AUDIOGUÍA -->
        <div class="info-card" id="info-card">
            <div id="info-content"></div>
            <div id="dynamic-link-container"></div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
            <button type="button" style="background-color: #4a5568;" onclick="resetScanner()">Scan / Search Again</button>
        </div>

    </div>

    <script type="text/javascript">
        // FUNCIÓN DE AUDIOGUÍA AUTOMÁTICA
        function speakAudioGuide(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.95;    
                window.speechSynthesis.speak(utterance);
            }
        }

        function stopAudioGuide() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // DETECCIÓN AUTOMÁTICA POR IP (CERO PERMISOS)
        async function detectLandmarkByIP() {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = "🌐 Locating your network position...";

            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                const lat = ipData.latitude;
                const lon = ipData.longitude;
                const city = ipData.city || "your area";

                statusBox.innerText = `🔍 Searching landmarks near ${city}...`;

                const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=10000&gslimit=1&format=json&origin=*`;
                const wikiRes = await fetch(wikiUrl);
                const wikiData = await wikiRes.json();

                if (wikiData.query && wikiData.query.geosearch.length > 0) {
                    const pageId = wikiData.query.geosearch[0].pageid;
                    const title = wikiData.query.geosearch[0].title;
                    fetchLandmarkDetails(pageId, title);
                } else {
                    statusBox.innerText = `📍 No major landmarks indexed right next to ${city}. Try manual search!`;
                }
            } catch (error) {
                statusBox.innerText = "❌ Connection error. Please try the manual search bar below.";
            }
        }

        // BÚSQUEDA MANUAL DE CUALQUIER MONUMENTO
        async function searchManualLandmark() {
            const query = document.getElementById("manual-search-input").value.trim();
            const statusBox = document.getElementById("status-box");

            if (!query) {
                statusBox.innerText = "⚠️ Please type a landmark or monument name.";
                return;
            }

            statusBox.innerText = `🔍 Searching global database for "${query}"...`;

            try {
                const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.query && data.query.search.length > 0) {
                    const pageId = data.query.search[0].pageid;
                    const title = data.query.search[0].title;
                    fetchLandmarkDetails(pageId, title);
                } else {
                    statusBox.innerText = `❌ No results found for "${query}". Try another name.`;
                }
            } catch (error) {
                statusBox.innerText = "❌ Error searching database.";
            }
        }

        // EXTRAER HISTORIA Y MOSTRAR RESULTADO CON VOZ
        async function fetchLandmarkDetails(pageId, title) {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = `✨ Landmark Loaded: ${title}`;

            const detailUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&pageids=${pageId}&format=json&origin=*`;
            const response = await fetch(detailUrl);
            const data = await response.json();

            const page = data.query.pages[pageId];
            const extract = page.extract || "No detailed history available.";

            const infoCard = document.getElementById("info-card");
            const infoContent = document.getElementById("info-content");
            const linkContainer = document.getElementById("dynamic-link-container");

            infoContent.innerHTML = `
                <h2>${title}</h2>
                <p><strong>Global Landmark Result</strong></p>
                <p>${extract.substring(0, 500)}...</p>
            `;

            linkContainer.innerHTML = `<a href="https://en.wikipedia.org/?curid=${pageId}" target="_blank" class="external-link-btn">Read Full Article Online</a>`;
            infoCard.style.display = "block";

            // Reproducir audioguía automáticamente
            const speechText = `${title}. ${extract.substring(0, 300)}`;
            speakAudioGuide(speechText);
        }

        function resetScanner() {
            stopAudioGuide();
            document.getElementById("info-card").style.display = "none";
            document.getElementById("manual-search-input").value = "";
            document.getElementById("status-box").innerText = "Auto-detect nearby monuments or search any global landmark manually.";
        }
    </script>

</body>
</html>
