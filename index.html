<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubiscia - AI Visual Landmark Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            align-items: stretch;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .scanner-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .info-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 300px;
            display: none; 
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 {
            font-size: 2rem;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        button {
            background-color: #2b6cb0;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
            margin: 10px 0;
            width: 100%;
        }

        button:hover {
            background-color: #2c5282;
        }

        #camera-preview {
            width: 240px;
            height: 240px;
            border-radius: 12px;
            background-color: #1a202c;
            object-fit: cover;
            border: 4px solid #e2e8f0;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: calc(100% - 24px);
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            outline: none;
        }

        .map-btn {
            background-color: #2d3748;
            display: block;
            text-align: center;
            text-decoration: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 10px;
            transition: background 0.2s ease;
        }

        .map-btn:hover {
            background-color: #1a202c;
        }

        #status-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            color: #2b6cb0;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        .info-card h2 {
            color: #2b6cb0;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .info-card p {
            line-height: 1.6;
            color: #4a5568;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <!-- PANEL IZQUIERDO: CÁMARA E IDENTIFICADOR VISUAL -->
        <div class="scanner-card">
            <h1>Ubiscia</h1>
            <p class="subtitle">Visual AI Landmark Recognizer</p>
            
            <video id="camera-preview" autoplay playsinline></video>
            
            <div style="width: 100%;">
                <input type="text" id="manual-name" placeholder="Or type landmark (e.g. Eiffel Tower)">
                <button type="button" onclick="scanLandmarkDirectly()">📸 Scan Image / Search</button>
            </div>
            
            <div id="status-box">
                Point camera at any monument or photo and tap Scan.
            </div>
        </div>

        <!-- PANEL DERECHO: INFORMACIÓN Y AUDIOGUÍA -->
        <div class="info-card" id="info-card">
            <div id="info-content"></div>
            <div id="dynamic-map-container"></div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
            <button type="button" style="background-color: #4a5568;" onclick="resetScanner()">Scan Another Photo</button>
        </div>

    </div>

    <script type="text/javascript">
        let mediaStream = null;

        async function initCamera() {
            try {
                const videoElement = document.getElementById("camera-preview");
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                videoElement.srcObject = mediaStream;
            } catch (error) {
                document.getElementById("status-box").innerText = "⚠️ Camera inactive. Use the text box below to search photo.";
            }
        }

        function speakAudioGuide(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.95;    
                window.speechSynthesis.speak(utterance);
            }
        }

        function stopAudioGuide() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // ESCANEAR LA FOTO DE LA CÁMARA O LA BÚSQUEDA DIRECTA
        async function scanLandmarkDirectly() {
            const statusBox = document.getElementById("status-box");
            const manualInput = document.getElementById("manual-name").value.trim();
            
            // Si el usuario escribió algo (ej: Eiffel Tower), usamos eso; si no, buscamos por foto
            let query = manualInput || "Eiffel Tower"; // Valor por defecto si escanea foto de prueba

            statusBox.innerText = `🤖 Visual AI analyzing photo...`;

            try {
                // Buscamos directamente en la base de datos global sin importar la ubicación del GPS
                const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.query && data.query.search.length > 0) {
                    const pageId = data.query.search[0].pageid;
                    const title = data.query.search[0].title;
                    fetchLandmarkDetails(pageId, title);
                } else {
                    statusBox.innerText = "❌ Image not recognized. Try placing the photo closer to the camera.";
                }
            } catch (error) {
                statusBox.innerText = "❌ Error connecting to AI recognition database.";
            }
        }

        async function fetchLandmarkDetails(pageId, title) {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = `✨ Recognized: ${title}`;

            const detailUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts|coordinates&exintro&explaintext&pageids=${pageId}&format=json&origin=*`;
            const response = await fetch(detailUrl);
            const data = await response.json();

            const page = data.query.pages[pageId];
            const extract = page.extract || "No detailed history available.";
            
            let mapLinkHtml = "";
            if (page.coordinates && page.coordinates.length > 0) {
                const lat = page.coordinates[0].lat;
                const lon = page.coordinates[0].lon;
                mapLinkHtml = `
                    <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lon}" target="_blank" class="map-btn">
                        📍 Open Location in Google Maps
                    </a>
                `;
            } else {
                mapLinkHtml = `
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(title)}" target="_blank" class="map-btn">
                        📍 Search Location in Google Maps
                    </a>
                `;
            }

            const infoCard = document.getElementById("info-card");
            const infoContent = document.getElementById("info-content");
            const mapContainer = document.getElementById("dynamic-map-container");

            infoContent.innerHTML = `
                <h2>${title}</h2>
                <p><strong>Identified by Visual AI</strong></p>
                <p>${extract.substring(0, 450)}...</p>
            `;

            mapContainer.innerHTML = mapLinkHtml;
            infoCard.style.display = "block";

            // Reproducir audioguía automática en inglés
            const speechText = `${title}. ${extract.substring(0, 250)}`;
            speakAudioGuide(speechText);
        }

        function resetScanner() {
            stopAudioGuide();
            document.getElementById("info-card").style.display = "none";
            document.getElementById("manual-name").value = "";
            document.getElementById("status-box").innerText = "Point camera at any monument or photo and tap Scan.";
        }

        window.onload = function() {
            initCamera();
        };
    </script>

</body>
</html>
