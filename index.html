<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubiscia - Camera & GPS AI Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            align-items: stretch;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .scanner-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .info-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 300px;
            display: none; 
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 {
            font-size: 2rem;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        button {
            background-color: #2b6cb0;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
            margin: 10px 0;
            width: 100%;
        }

        button:hover {
            background-color: #2c5282;
        }

        #camera-preview {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            background-color: #1a202c;
            object-fit: cover;
            border: 4px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .map-btn {
            background-color: #2d3748;
            display: block;
            text-align: center;
            text-decoration: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 10px;
            transition: background 0.2s ease;
        }

        .map-btn:hover {
            background-color: #1a202c;
        }

        #status-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            color: #2b6cb0;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        .info-card h2 {
            color: #2b6cb0;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .info-card p {
            line-height: 1.6;
            color: #4a5568;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <!-- PANEL IZQUIERDO: CÁMARA Y ESCÁNER GPS EXACTO -->
        <div class="scanner-card">
            <h1>Ubiscia</h1>
            <p class="subtitle">Camera AI & Exact GPS Navigation</p>
            
            <!-- Vista de la cámara en directo -->
            <video id="camera-preview" autoplay playsinline></video>
            
            <div id="btn-control-container" style="width: 100%;">
                <button type="button" onclick="scanWithCameraAndGPS()">📸 Scan Landmark with Camera</button>
            </div>
            
            <div id="status-box">
                Point your camera at the monument and tap scan.
            </div>
        </div>

        <!-- PANEL DERECHO: INFORMACIÓN, VOZ Y GOOGLE MAPS -->
        <div class="info-card" id="info-card">
            <div id="info-content"></div>
            <div id="dynamic-map-container"></div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
            <button type="button" style="background-color: #4a5568;" onclick="resetScanner()">Scan Again</button>
        </div>

    </div>

    <script type="text/javascript">
        let mediaStream = null;

        // Iniciar la cámara del móvil o PC automáticamente al entrar
        async function initCamera() {
            try {
                const videoElement = document.getElementById("camera-preview");
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } // Usa la cámara trasera en móviles si está disponible
                });
                videoElement.srcObject = mediaStream;
            } catch (error) {
                document.getElementById("status-box").innerText = "⚠️ Camera access denied or unavailable.";
            }
        }

        // Reproducir audioguía automática por voz
        function speakAudioGuide(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.95;    
                window.speechSynthesis.speak(utterance);
            }
        }

        function stopAudioGuide() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // ESCANEAR USANDO LA CÁMARA + GPS EXACTO (Radio de 150 metros)
        function scanWithCameraAndGPS() {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = "📍 Getting exact GPS coordinates from your location...";

            if (!navigator.geolocation) {
                statusBox.innerText = "❌ Geolocation is not supported by your browser.";
                return;
            }

            // Pedir la ubicación exacta del usuario con alta precisión
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                statusBox.innerText = "🔍 Analyzing monument right in front of you...";

                try {
                    // Buscamos monumentos en un radio ultra-cercano de 150 metros (evita errores de barrio)
                    const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=150&gslimit=1&format=json&origin=*`;
                    const response = await fetch(wikiUrl);
                    const data = await response.json();

                    if (data.query && data.query.geosearch.length > 0) {
                        const place = data.query.geosearch[0];
                        fetchLandmarkDetails(place.pageid, place.title, place.lat, place.lon);
                    } else {
                        statusBox.innerText = "📍 No monument found within 150 meters. Move closer to the landmark!";
                    }
                } catch (error) {
                    statusBox.innerText = "❌ Error connecting to global database.";
                }
            }, (error) => {
                statusBox.innerText = "⚠️ Please allow exact GPS location access to scan.";
            }, { enableHighAccuracy: true });
        }

        // EXTRAER INFORMACIÓN Y CONFIGURAR GOOGLE MAPS
        async function fetchLandmarkDetails(pageId, title, monumentLat, monumentLon) {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = `✨ Found: ${title}`;

            const detailUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&pageids=${pageId}&format=json&origin=*`;
            const response = await fetch(detailUrl);
            const data = await response.json();

            const page = data.query.pages[pageId];
            const extract = page.extract || "No detailed history available.";

            const infoCard = document.getElementById("info-card");
            const infoContent = document.getElementById("info-content");
            const mapContainer = document.getElementById("dynamic-map-container");

            // Mostrar contenido en la tarjeta derecha
            infoContent.innerHTML = `
                <h2>${title}</h2>
                <p><strong>Detected via Camera & Exact GPS</strong></p>
                <p>${extract.substring(0, 450)}...</p>
            `;

            // Enlace directo a Google Maps con las coordenadas exactas del monumento
            mapContainer.innerHTML = `
                <a href="https://www.google.com/maps/search/?api=1&query=${monumentLat},${monumentLon}" target="_blank" class="map-btn">
                    📍 Open Exact Route in Google Maps
                </a>
            `;

            infoCard.style.display = "block";

            // Lanzar la voz de la IA en inglés automáticamente
            const speechText = `${title}. ${extract.substring(0, 250)}`;
            speakAudioGuide(speechText);
        }

        function resetScanner() {
            stopAudioGuide();
            document.getElementById("info-card").style.display = "none";
            document.getElementById("status-box").innerText = "Point your camera at the monument and tap scan.";
        }

        // Arrancar la cámara al cargar la página
        window.onload = function() {
            initCamera();
        };
    </script>

</body>
</html>
